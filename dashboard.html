<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仪表盘 - 财务管理系统</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/css/bootstrap.min.css" rel="stylesheet">
    <link href="assets/css/common.css" rel="stylesheet">
</head>
<body class="bg-light">
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark" style="background: var(--primary-color)">
        <div class="container">
            <a class="navbar-brand" href="#">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" class="bi bi-cash-stack" viewBox="0 0 16 16">
                    <path d="M14 3H1a1 1 0 0 1 1-1h12a1 1 0 0 1 1 1h-1z"/>
                    <path fill-rule="evenodd" d="M15 5H1v8a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V5zM4 11a2 2 0 1 1 4 0 2 2 0 0 1-4 0z"/>
                </svg>
                财务管理系统
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-nav ms-auto">
                    <a class="nav-link" href="index.html">首页</a>
                    <a class="nav-link active" href="dashboard.html">仪表盘</a>
                    <a class="nav-link" href="transactions.html">流水记录</a>
                    <a class="nav-link" href="admin.html">后台管理</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- 仪表盘 -->
    <div id="dashboard" class="container mt-4">
        <div class="row g-4">
            <div class="col-md-4">
                <div class="stat-card card text-white bg-success">
                    <div class="card-body">
                        <h5 class="card-title">总收入</h5>
                        <h2 id="totalIncome">0.00</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card card text-white bg-danger">
                    <div class="card-body">
                        <h5 class="card-title">总支出</h5>
                        <h2 id="totalExpense">0.00</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card card text-white bg-primary">
                    <div class="card-body">
                        <h5 class="card-title">当前结余</h5>
                        <h2 id="totalBalance">0.00</h2>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/common.js"></script>
    <script>
        // 页面加载完成后执行
        document.addEventListener('DOMContentLoaded', loadStatistics);
    </script>
</body>
</html>
